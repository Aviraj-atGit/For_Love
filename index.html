<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For You ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SCREEN 1 -->
<section class="screen active" id="screen1">
  <div class="teddy">🧸</div>
  <h1 id="typing"></h1>
  <button onclick="nextScreen(1)">Start 💖</button>
</section>

<!-- SCREEN 2 -->
<section class="screen" id="screen2">
  <h2>The first time I saw you 💫</h2>
  <button onclick="nextScreen(2)">Next ❤️</button>
</section>

<!-- SCREEN 3 -->
<section class="screen" id="screen3">
  <h1>💌 For You</h1>
  <button onclick="openGallery()">💖 Our Cute Memories 💖</button>
  <button onclick="nextScreen(3)">Next 💖</button>
</section>

<!-- SCREEN 4 -->
<section class="screen" id="screen4">
  <div class="teddy">🧸</div>
  <h1>I love you ❤️</h1>
  <h2>Will you be mine? 💍</h2>

  <button onclick="nextScreen(4)">YES 😍</button>
  <button id="noBtn">NO 😈</button>
</section>

<!-- SCREEN 5 -->
<section class="screen" id="screen5">
  <h1>YAYYYY ❤️💍</h1>
</section>

<!-- 💖 GALLERY -->
<div id="gallery" class="gallery">

  <button onclick="prevSlide()">⬅</button>

  <img id="sliderImage">

  <button onclick="nextSlide()">➡</button>

  <br>
  <button onclick="closeGallery()">Close ❌</button>

</div>

<script src="script.js"></script>
</body>
</html>
